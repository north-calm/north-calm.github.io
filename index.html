<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reason Field | Systems Engineering</title>

    <!-- Typography: Space Grotesk for architectural precision, Inter for clean reading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #030303; /* Deepest off-black */
            color: #ffffff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            /* A subtle noise texture over the whole body to make it feel like physical media */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* The Ambient Canvas Layer */
        #field-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 
           The UI Grid
           Positioned safely above the canvas with no disruptive blend modes.
        */
        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3vw 4vw;
        }

        /* 
           Massive Center Text 
           Features a heavy text-shadow (glow) matching the background color.
           This acts as an invisible shield, ensuring particles never make the text hard to read.
        */
        .center-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 10vw, 12rem); 
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: -0.05em;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            text-shadow: 0 0 60px rgba(3, 3, 3, 0.9), 0 0 120px rgba(3, 3, 3, 0.9);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .description {
            font-weight: 300;
            font-size: clamp(0.95rem, 1.2vw, 1.15rem);
            line-height: 1.6;
            max-width: 420px;
            color: rgba(255, 255, 255, 0.8);
            /* Protects readability */
            text-shadow: 0 0 20px rgba(3, 3, 3, 1);
        }

        .contact-wrapper {
            font-family: 'Space Grotesk', sans-serif;
            text-align: right;
            pointer-events: auto; /* Re-enable clicks */
        }

        .contact-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .contact-link {
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            color: #ffffff;
            text-decoration: none;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
        }

        .contact-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s ease;
        }

        .contact-link:hover::after {
            background-color: #ffffff;
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .interface { padding: 8vw 6vw; }
            .bottom-bar { flex-direction: column; align-items: flex-start; gap: 3rem; }
            .description { max-width: 100%; }
            .contact-wrapper { text-align: left; }
        }
    </style>
</head>
<body>

    <!-- Generative Magnetic Field Canvas -->
    <canvas id="field-canvas"></canvas>

    <!-- Harmonious UI Layer -->
    <main class="interface">
        
        <div class="top-bar">
            <div>Reason Field</div>
            <div>Bespoke Engineering</div>
        </div>

        <div class="center-title">
            REASON<br>FIELD
        </div>

        <div class="bottom-bar">
            <div class="description">
                Operating at the intersection of utility and creativity. We engineer high-performance software, complex logic systems, and architectural solutions from the ground up.
            </div>
            
            <div class="contact-wrapper">
                <span class="contact-label">Direct Inquiries</span>
                <a href="mailto:inforeasonfield@gmail.com" class="contact-link">inforeasonfield@gmail.com</a>
            </div>
        </div>

    </main>

    <script>
        /**
         * Ambient Particle Torus (The "Reason Field")
         * Creates a massive, incredibly smooth ring of particles representing 
         * perfectly organized computational logic and data architecture.
         */
        const canvas = document.getElementById('field-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        const particleCount = 4000; // High count, but rendered softly
        
        // Mathematical parameters for the Torus (Ring)
        const R = 300; // Main radius of the ring
        const r = 100; // Thickness of the ring

        let time = 0;
        let mouseX = 0;
        let mouseY = 0;

        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            particles = [];
            
            // Distribute points mathematically across a 3D Torus
            for (let i = 0; i < particleCount; i++) {
                // u and v are angles for the torus formula
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;
                
                // Add a little random noise to make it look like a field of data, not a solid object
                const noiseX = (Math.random() - 0.5) * 40;
                const noiseY = (Math.random() - 0.5) * 40;
                const noiseZ = (Math.random() - 0.5) * 40;

                particles.push({
                    u: u,
                    v: v,
                    nx: noiseX,
                    ny: noiseY,
                    nz: noiseZ,
                    speedOffset: Math.random() * 0.002 + 0.001,
                    size: Math.random() * 1.5 + 0.2
                });
            }
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        // Subtle parallax effect on mouse move
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - width / 2) * 0.0005;
            mouseY = (e.clientY - height / 2) * 0.0005;
        });

        function render() {
            // Very soft clear to create a smooth, ambient glow
            ctx.fillStyle = 'rgba(3, 3, 3, 0.2)';
            ctx.fillRect(0, 0, width, height);

            time += 0.005; // Extremely slow, peaceful rotation

            const centerX = width / 2;
            const centerY = height / 2;

            // Camera tilt angles
            const rotX = 1.2 + mouseY; 
            const rotZ = time + mouseX;

            const cx = Math.cos(rotX), sx = Math.sin(rotX);
            const cz = Math.cos(rotZ), sz = Math.sin(rotZ);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; // Soft white/silver particles

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // Slowly animate the particles around the tube of the torus
                p.v += p.speedOffset;

                // 3D Torus parametric equations
                let px = (R + r * Math.cos(p.v)) * Math.cos(p.u) + p.nx;
                let py = (R + r * Math.cos(p.v)) * Math.sin(p.u) + p.ny;
                let pz = r * Math.sin(p.v) + p.nz;

                // 3D Rotations (Rotate around Z, then X to tilt it)
                // Z-rotation
                let x1 = px * cz - py * sz;
                let y1 = px * sz + py * cz;

                // X-rotation
                let y2 = y1 * cx - pz * sx;
                let z2 = y1 * sx + pz * cx;

                // Push back from camera
                z2 += 900; 

                // Simple perspective projection
                if (z2 > 100) {
                    const scale = 800 / z2;
                    const screenX = centerX + x1 * scale;
                    const screenY = centerY + y2 * scale;
                    
                    // Particles further away are smaller and dimmer
                    const currentSize = p.size * scale;
                    const alpha = Math.max(0, Math.min(0.6, scale * 0.5));

                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
